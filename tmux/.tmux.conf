set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# Advertise modern terminal capabilities to applications running inside tmux.
set -g default-terminal "tmux-256color"
set-option -sa terminal-features ",xterm*:RGB"

# Claude Code: pass terminal control sequences through and preserve modified keys.
set -g allow-passthrough on
set -s extended-keys on
set-option -sa terminal-features "xterm*:extkeys"

# Enables vi mode in copy mode
set-window-option -g mode-keys vi 

# Prefix + Ctrl+L: Force full clear + reset, even during live output.
# Plain Ctrl+L remains available to Claude Code and other TUIs for redraws.
bind-key C-l \
  send-keys C-c \; \
  send-keys 'printf "\033[2J\033[3J\033[H"\r' \; \
  clear-history

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Opens tmux sessionizer
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
